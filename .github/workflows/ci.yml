name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: WordPress Plugin Check ausführen
        uses: wordpress/plugin-check-action@6f5a57e173c065a394b78688f75df543e4011902 # v1
        with:
          build-dir: './'
          exclude-directories: 'vendor,tests,.github,dist,bin'
          exclude-files: '.gitignore,.distignore,.phpcs.xml,composer.json,composer.lock,phpunit.xml,phpunit.xml.dist,phpstan.neon,infection.json5,sonar-project.properties,qodana.yaml,Makefile'

  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    permissions:
      checks: write

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP ${{ matrix.php }} einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, mbstring, json
          coverage: none
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Tests ausführen
        run: ./vendor/bin/phpunit --log-junit test-results.xml

      - name: Testergebnisse veröffentlichen
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 # v6
        if: always()
        with:
          report_paths: test-results.xml
          check_name: PHPUnit (PHP ${{ matrix.php }})

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 mit Xdebug einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring, json
          coverage: xdebug
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Tests mit Coverage ausführen
        run: ./vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Coverage zu Codecov hochladen
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring, json
          coverage: none
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Sicherheits-Audit
        run: composer audit --no-interaction

      - name: PHPStan ausführen
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring, json
          coverage: none
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: PHPCS ausführen
        run: ./vendor/bin/phpcs

  infection:
    name: Mutation Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: PHP 8.2 mit Xdebug einrichten
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring, json
          coverage: xdebug
          tools: composer:v2

      - name: Composer-Cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-reqs

      - name: Infection ausführen
        run: ./vendor/bin/infection --no-progress --min-msi=70 --min-covered-msi=80
