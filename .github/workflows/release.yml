name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.3.0)'
        required: true
      skip-wp-version-check:
        description: 'WordPress-Versions-Check überspringen'
        type: boolean
        default: false

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WP_TESTED_UP_TO: '7.0'
  WP_REQUIRES_AT_LEAST: '6.7'

jobs:
  wait-for-ci:
    name: Warte auf CI
    runs-on: ubuntu-latest

    steps:
      - name: CI-Ergebnis des Commits prüfen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Warte auf CI für Commit $SHA ..."

          for i in $(seq 1 40); do
            JSON=$(gh api "repos/$REPO/actions/runs?head_sha=$SHA&event=push" 2>/dev/null)
            STATUS=$(echo "$JSON"     | jq -r '[.workflow_runs[] | select(.name == "CI")] | first | .status')
            CONCLUSION=$(echo "$JSON" | jq -r '[.workflow_runs[] | select(.name == "CI")] | first | .conclusion')

            echo "Versuch $i – Status: $STATUS / Conclusion: $CONCLUSION"

            if [ "$CONCLUSION" = "success" ]; then
              echo "CI erfolgreich."
              exit 0
            elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "CI fehlgeschlagen: $CONCLUSION"
              exit 1
            fi

            sleep 15
          done

          echo "Timeout: CI hat nicht rechtzeitig abgeschlossen."
          exit 1

  check-wp-versions:
    name: WordPress-Versionen prüfen
    runs-on: ubuntu-latest
    needs: [wait-for-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Check überspringen?
        if: ${{ github.event.inputs.skip-wp-version-check == 'true' }}
        run: |
          echo "⚠️  WordPress-Versions-Check wurde manuell übersprungen."

      - name: WordPress-Versions-Matrix prüfen
        if: ${{ github.event.inputs.skip-wp-version-check != 'true' }}
        run: |
          # Aktuelle Versionen aus der WP-API ermitteln
          JSON=$(curl -sf "https://api.wordpress.org/core/version-check/1.7/")
          EXPECTED=$(echo "$JSON" \
            | jq -r '[.offers[].version] | map(split(".") | .[0:2] | join(".")) | unique | sort_by(split(".") | map(tonumber)) | reverse | .[:4] | reverse | .[]')

          EXPECTED_OLDEST=$(echo "$EXPECTED" | head -1)
          EXPECTED_LATEST=$(echo "$EXPECTED" | tail -1)

          echo "Erwartet laut WP-API:"
          echo "  Oldest: ${EXPECTED_OLDEST}"
          echo "  Latest: ${EXPECTED_LATEST}"

          # Konfigurierte Werte aus den Job-Env-Vars (bereits als Umgebungsvariablen verfügbar)
          CURRENT_REQUIRES="${WP_REQUIRES_AT_LEAST}"
          CURRENT_TESTED="${WP_TESTED_UP_TO}"

          echo ""
          echo "Aktuell konfiguriert:"
          echo "  WP_REQUIRES_AT_LEAST: ${CURRENT_REQUIRES}"
          echo "  WP_TESTED_UP_TO:      ${CURRENT_TESTED}"

          FAILED=0
          if [ "$CURRENT_REQUIRES" != "$EXPECTED_OLDEST" ]; then
            echo ""
            echo "❌ WP_REQUIRES_AT_LEAST ist veraltet: ${CURRENT_REQUIRES} (erwartet: ${EXPECTED_OLDEST})"
            FAILED=1
          fi
          if [ "$CURRENT_TESTED" != "$EXPECTED_LATEST" ]; then
            echo ""
            echo "❌ WP_TESTED_UP_TO ist veraltet: ${CURRENT_TESTED} (erwartet: ${EXPECTED_LATEST})"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "WordPress-Versionen sind nicht aktuell."
            echo "Bitte zuerst den Workflow 'WordPress-Versionen aktualisieren' ausführen,"
            echo "den erzeugten PR mergen und dann erneut releasen."
            echo ""
            echo "Oder den Release manuell mit 'skip-wp-version-check: true' starten."
            exit 1
          fi

          echo ""
          echo "✅ WordPress-Versionen sind aktuell."

  release:
    name: Release bauen & veröffentlichen
    runs-on: ubuntu-latest
    needs: [check-wp-versions]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: PHP einrichten (für composer)
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          extensions: openssl, mbstring, json
          coverage: none
          tools: composer:v2

      - name: Version aus Tag ermitteln
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Versionsnummer in Plugin-Dateien einsetzen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/^\( \* Version:\s*\).*/\1${VERSION}/" oidc-client.php
          sed -i "s/^define( 'OIDC_CLIENT_VERSION', '[^']*' );/define( 'OIDC_CLIENT_VERSION', '${VERSION}' );/" oidc-client.php
          sed -i "s/^\( \* Requires at least:\s*\).*/\1${WP_REQUIRES_AT_LEAST}/" oidc-client.php
          sed -i "s/WordPress-[0-9][0-9]*\.[0-9][0-9]*%2B/WordPress-${WP_REQUIRES_AT_LEAST}%2B/" README.md
          sed -i "s/WordPress [0-9][0-9]*\.[0-9][0-9]* oder höher (offiziell/WordPress ${WP_REQUIRES_AT_LEAST} oder höher (offiziell/" README.md
          sed -i "s/^Stable tag:.*/Stable tag: ${VERSION}/" readme.txt
          sed -i "s/^Tested up to:.*/Tested up to: ${WP_TESTED_UP_TO}/" readme.txt
          sed -i "s/^Requires at least:.*/Requires at least: ${WP_REQUIRES_AT_LEAST}/" readme.txt
          sed -i "s/^define( 'OIDC_EXPECTED_VERSION', '[^']*' );/define( 'OIDC_EXPECTED_VERSION', '${VERSION}' );/" tests/Unit/PluginMainTest.php

      - name: Produktiv-Abhängigkeiten installieren
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Plugin-ZIP erstellen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: bash bin/build.sh

      - name: ZIP-Integrität prüfen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ZIP="dist/oidc-client-${VERSION}.zip"
          echo "Prüfe ZIP-Integrität: ${ZIP}"
          unzip -t "${ZIP}"
          sha256sum "${ZIP}" | tee "dist/oidc-client-${VERSION}.zip.sha256"
          echo "Größe: $(du -sh "${ZIP}" | cut -f1)"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/oidc-client-${{ steps.version.outputs.VERSION }}.zip
            dist/oidc-client-${{ steps.version.outputs.VERSION }}.zip.sha256
