sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=test-results.xml

sonar.exclusions=vendor/**,dist/**,assets/**
sonar.coverage.exclusions=tests/**
sonar.cpd.exclusions=tests/**

# False Positives in Testdateien:
# e1–e3: Security Hotspots (HTTP-URLs, hardcodierte IPs, Hash-Algorithmen)
# e4:    Leere Mock-Methoden (insert, query etc.) ohne Kommentar (S1186)
# e5:    Ungenutzte Parameter in Mock-Lambdas (S1172)
# e6:    Zu viele Returns in Test-Helper-Closures (S1142)
# e7:    Cognitive Complexity in Test-Closures (S3776)
# e8:    Reflection-Zugriff auf private Methoden in Tests (S3011)
# e9:    Methodennamen mit Underscores in Tests (S100, WP-Konvention)
# e10:   Methodennamen mit Underscores in Produktionscode (S100, WP-Konvention)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10
