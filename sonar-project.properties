sonar.projectKey=johannesroesch_oidc-client
sonar.organization=johannesroesch

sonar.sources=includes,oidc-client.php
sonar.tests=tests

sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=test-results.xml

sonar.exclusions=vendor/**,dist/**,assets/**
sonar.coverage.exclusions=tests/**
sonar.cpd.exclusions=tests/**

# Security Hotspots in Testdateien sind False Positives
# (HTTP-URLs in OIDC-Spec-Strings, hardcodierte IPs für Tests)
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S1313
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=php:S4790
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/**
