# False Positives in Testdateien:
# e1–e3: Security Hotspots (HTTP-URLs, hardcodierte IPs, Hash-Algorithmen)
# e4:    Leere Mock-Methoden (insert, query etc.) ohne Kommentar (S1186)
# e5:    Ungenutzte Parameter in Mock-Lambdas (S1172)
# e6:    Zu viele Returns in Test-Helper-Closures (S1142)
# e7:    Cognitive Complexity in Test-Closures (S3776)
# e8:    Reflection-Zugriff auf private Methoden in Tests (S3011)
# e9:    Methodennamen mit Underscores in Tests (S100, WP-Konvention)
# e10:   Methodennamen mit Underscores in Produktionscode (S100, WP-Konvention)
# e11:   Ungenutzte lokale Variablen in Tests (Destructuring-Platzhalter, S1481)
# e12:   Klassenname entspricht nicht camelCase (S101, WP-Konvention: OIDC_*)
# e13:   Tabs statt Spaces (S105, WP Coding Standards erlauben Tabs)
# e14:   Zu viele Returns (S1142, WP-Stil mit Early Returns)
# e15:   Ungenutzte Parameter $_args (S1172, WP-Hook-Callbacks erfordern Signatur)
# e16:   Cognitive Complexity (S3776, WP-Auth-Flow ist inhärent komplex)
# e17:   md5() als Cache-Key, kein sicherheitsrelevanter Kontext (S4790)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12,e13,e14,e15,e16,e17
